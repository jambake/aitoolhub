<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AI Ware HQ</title>
    <style>
        :root { --primary: #2563eb; --text: #1f2937; --text-light: #6b7280; --border: #e5e7eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.7; max-width: 800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid var(--border); }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        nav { display: flex; justify-content: center; gap: 30px; padding: 20px 0; border-bottom: 1px solid var(--border); }
        nav a { text-decoration: none; color: var(--text); font-weight: 500; }
        main { padding: 40px 0; text-align: center; }
        .contact-methods { margin: 30px 0; }
        .contact-methods p { margin-bottom: 15px; }
        .contact-methods a { color: var(--primary); }
        footer { text-align: center; padding: 30px 0; border-top: 1px solid var(--border); color: var(--text-light); font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/writing-tools/">Writing</a>
        <a href="/image-tools/">Image Gen</a>
        <a href="/coding-tools/">Coding</a>
        <a href="/about/">About</a>
    </nav>
    <main>
        <p>We'd love to hear from you!</p>
        
        <div class="contact-methods">
            <p><strong>Email:</strong> hello@aiwarehq.com</p>
            <p><strong>Twitter:</strong> @aiwarehq</p>
        </div>
        
        <p>For affiliate inquiries, please include "affiliate" in the subject line.</p>
    </main>
    <footer>
        <p>© 2026 AI Ware HQ. All rights reserved.</p>
    </footer>
</body>
</html>
