            { name: "Looka", slug: "looka", category: "design", rating: 4.2, ratingStars: "★★★★☆", desc: "AI logo maker and brand identity builder.", price: "Free/$20", bestFor: "Logos", strength: "Easy to use", weakness: "Limited free tier" },

            { name: "Devin AI", slug: "devin-ai", category: "coding", rating: 4.5, ratingStars: "★★★★☆", desc: "The world's first AI software engineer. Can build complete applications autonomously.", price: "Waitlist", bestFor: "Autonomous coding", strength: "Full project execution", weakness: "Limited access" },
            { name: "SlidesAI", slug: "slides-ai", category: "productivity", rating: 4.5, ratingStars: "★★★★☆", desc: "AI-powered presentation builder that works with Google Slides.", price: "Free/$10/mo", bestFor: "Presentations", strength: "Google Slides integration", weakness: "Limited customization free" }
        ];
        
        let selectedForCompare = [];
        
        function getCategoryLabel(cat) {
            const labels = {
                writing: "Writing",
                coding: "Coding",
                image: "Image",
                video: "Video",
                audio: "Audio",
                productivity: "Productivity",
                research: "Research",
                design: "Design"
            };
            return labels[cat] || cat;
        }
        
        function renderReviews(filter = 'all') {
            const grid = document.getElementById('reviews-grid');
            const filtered = filter === 'all' ? reviews : reviews.filter(r => r.category === filter);
            
            grid.innerHTML = filtered.map(review => {
                const isSelected = selectedForCompare.includes(review.slug);
                return `
                    <a href="${review.slug}.html" class="review-card">
                        <div class="content">
                            <div class="compare-check ${isSelected ? 'checked' : ''}" onclick="toggleCompare('${review.slug}', event)">
                                ${isSelected ? '✓' : '+'}
                            </div>
                            <h3>${review.name}</h3>
                            <p>${review.desc}</p>
                            <div class="meta">
                                <span class="rating">${review.ratingStars} <span style="color:var(--text-muted);font-weight:400">${review.rating}</span></span>
                                <span class="tag">${getCategoryLabel(review.category)}</span>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }
        
        function toggleCompare(slug, event) {
            event.preventDefault();
            event.stopPropagation();
            const idx = selectedForCompare.indexOf(slug);
            if (idx > -1) {
                selectedForCompare.splice(idx, 1);
            } else if (selectedForCompare.length < 3) {
                selectedForCompare.push(slug);
            }
            renderReviews(new URLSearchParams(window.location.search).get('category') || 'all');
            updateCompareBar();
        }
        
        function updateCompareBar() {
            const bar = document.getElementById('compare-bar');
            const btn = document.getElementById('compare-btn');
            if (selectedForCompare.length > 0) {
                bar.style.display = 'flex';
                btn.disabled = selectedForCompare.length < 2;
                btn.textContent = selectedForCompare.length < 2 ? 'Select 2-3 to compare' : `Compare ${selectedForCompare.length} tools`;
            } else {
                bar.style.display = 'none';
            }
        }
        
        function showComparison() {
            const selected = reviews.filter(r => selectedForCompare.includes(r.slug));
            const modal = document.getElementById('compare-modal');
            const content = document.getElementById('compare-content');
            
            const cols = ['Name', 'Rating', 'Price', 'Best For', 'Strength', 'Weakness', 'Category'];
            const getVal = (r, col) => {
                if (col === 'Rating') return r.ratingStars + ' ' + r.rating;
                return r[col.toLowerCase()] || r[col === 'Category' ? 'category' : ''] || '-';
            };
            
            content.innerHTML = `
                <table class="compare-table">
                    <tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>
                    ${selected.map(r => `
                        <tr>${cols.map(c => `<td>${getVal(r, c)}</td>`).join('')}</tr>
                    `).join('')}
                </table>
            `;
            modal.style.display = 'flex';
        }
        
        function closeCompareModal() {
            document.getElementById('compare-modal').style.display = 'none';
        }
        
        // Get category from URL
        const params = new URLSearchParams(window.location.search);
        const category = params.get('category') || 'all';
        
        // Update active filter
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('href').includes(category)) {
                btn.classList.add('active');
            }
        });
        
        renderReviews(category);
    </script>
</body>
