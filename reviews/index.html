<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All AI Tool Reviews - AIWareHQ</title>
    <meta name="description" content="Browse all 50+ AI tool reviews. Find the best AI for writing, coding, images, video and more.">
    <link rel="canonical" href="https://aiwarehq.com/reviews/">
    <style>
        :root {
            --bg: #0d0d12;
            --card-bg: #16161d;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #10b981;
            --primary: #6366f1;
            --border: #27272a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(13, 13, 18, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            padding: 1rem 2rem;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
        }
        .logo span { color: var(--accent); }
        nav { display: flex; gap: 2rem; align-items: center; }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--accent); }
        
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .page-header h1 span { color: var(--accent); }
        .page-header p { color: var(--text-muted); }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-decoration: none;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        
        /* Review Grid */
        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .review-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .review-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }
        .review-card .content {
            padding: 1.5rem;
        }
        .review-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .review-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .review-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rating { color: #fbbf24; font-weight: 600; }
        .tag {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        footer {
            border-top: 1px solid var(--border);
            padding: 3rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">

            <nav>

    <main>

        <div class="filters">

    <footer>

            { name: "Copy.ai", slug: "copy-ai", category: "writing", rating: "★★★★☆", desc: "AI-powered marketing copy generator. Create ads, product descriptions, and content at scale." },
            { name: "Canva AI", slug: "canva-ai", category: "image", rating: "★★★★☆", desc: "AI-powered design platform with Magic Design, Text to Image, and instant background removal." },
            { name: "Wordtune", slug: "wordtune", category: "writing", rating: "★★★★☆", desc: "AI-powered writing companion that rewrites, summarizes, and improves your text in 10 languages." },
            { name: "Character AI", slug: "character-ai", category: "writing", rating: "★★★★☆", desc: "Create and chat with AI characters. Free tier available with optional Character AI+ subscription." },
            { name: "Poe", slug: "poe", category: "productivity", rating: "★★★★☆", desc: "Quora's AI platform to chat with GPT-4, Claude, Gemini, and more. Compare AI models side-by-side." },
            { name: "Microsoft Copilot", slug: "microsoft-copilot", category: "productivity", rating: "★★★★★", desc: "AI assistant integrated into Windows, Office, and Edge. Deep ecosystem integration with free and paid tiers." },
            { name: "Luma AI", slug: "luma-ai", category: "image", rating: "★★★★☆", desc: "Transform photos into stunning 3D models with AI. Great for e-commerce, real estate, game assets." },
            { name: "CapCut", slug: "capcut", category: "video", rating: "★★★★☆", desc: "Free AI-powered video editor with auto-captions, background removal, and smart effects. Perfect for creators." },
        ];
        
        function getCategoryLabel(cat) {
            const labels = {
                writing: "Writing",
                coding: "Coding",
                image: "Image",
                video: "Video",
                audio: "Audio",
                productivity: "Productivity",
                research: "Research"
            };
            return labels[cat] || cat;
        }
        
        function renderReviews(filter = 'all') {
            const grid = document.getElementById('reviews-grid');
            const filtered = filter === 'all' ? reviews : reviews.filter(r => r.category === filter);
            
            grid.innerHTML = filtered.map(review => `
                <a href="${review.slug}.html" class="review-card">
                    <div class="content">
                        <h3>${review.name}</h3>
                        <p>${review.desc}</p>
                        <div class="meta">
                            <span class="rating">${review.rating}</span>
                            <span class="tag">${getCategoryLabel(review.category)}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }
        
        // Get category from URL
        const params = new URLSearchParams(window.location.search);
        const category = params.get('category') || 'all';
        
        // Update active filter
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('href').includes(category)) {
                btn.classList.add('active');
            }
        });
        
        renderReviews(category);
    </script>
